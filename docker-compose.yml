services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      DB_PATH: /data/database.sqlite
      CORS_ORIGIN: "*"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"

volumes:
  backend_data:
